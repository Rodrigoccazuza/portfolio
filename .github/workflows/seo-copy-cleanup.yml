name: SEO and copy cleanup

on:
  push:
    branches:
      - main
    paths:
      - scripts/seo-copy-cleanup.js
      - .github/workflows/seo-copy-cleanup.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update copy and SEO
        run: node scripts/seo-copy-cleanup.js

      - name: Commit optimized website
        run: |
          if git diff --quiet; then
            echo "No website changes were needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html' sitemap.xml robots.txt
          git commit -m "Optimize website copy and SEO"
          git push
